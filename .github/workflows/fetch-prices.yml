name: Fetch Live Prices

on:
  schedule:
    - cron: '*/30 1-9 * * 1-5'   # 港股交易時間 09:00-17:30 HKT (UTC+8 = UTC 01:00-09:30)
    - cron: '0 22 * * 0'          # 週日 06:00 HKT 更新一次（週末備用）
  workflow_dispatch:               # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Yahoo Finance prices
        run: |
          python3 - <<'EOF'
          import urllib.request, json, datetime, os

          symbols = ['2802.HK', '3416.HK', '^HSCE']
          url = f"https://query2.finance.yahoo.com/v7/finance/quote?symbols={','.join(symbols)}&fields=regularMarketPrice,regularMarketPreviousClose,regularMarketTime"

          req = urllib.request.Request(url, headers={
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json'
          })

          try:
            with urllib.request.urlopen(req, timeout=15) as resp:
              data = json.loads(resp.read())
            results = data.get('quoteResponse', {}).get('result', [])
            out = {'updatedAt': datetime.datetime.utcnow().isoformat() + 'Z', 'prices': {}}
            for q in results:
              out['prices'][q['symbol']] = {
                'price': q.get('regularMarketPrice'),
                'prev':  q.get('regularMarketPreviousClose'),
                'time':  q.get('regularMarketTime')
              }
            os.makedirs('data', exist_ok=True)
            with open('data/live.json', 'w') as f:
              json.dump(out, f, indent=2)
            print('Success:', out)
          except Exception as e:
            print('Error:', e)
            exit(1)
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --staged --quiet || git commit -m "chore: update live prices $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
