name: Fetch Live Prices

on:
  schedule:
    - cron: '*/30 1-9 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices via yfinance
        run: |
          python3 - <<'EOF'
          import yfinance as yf
          import json, datetime, os

          tickers = yf.Tickers('2802.HK 3416.HK ^HSCE')
          out = {
            'updatedAt': datetime.datetime.utcnow().isoformat() + 'Z',
            'prices': {}
          }

          mapping = {
            '2802.HK': '2802.HK',
            '3416.HK': '3416.HK',
            '^HSCE':   '^HSCE'
          }

          for sym, key in mapping.items():
            try:
              info = tickers.tickers[sym].fast_info
              out['prices'][key] = {
                'price': round(float(info.last_price), 4),
                'prev':  round(float(info.previous_close), 4),
                'time':  None
              }
              print(f'{sym}: {info.last_price}')
            except Exception as e:
              print(f'Error fetching {sym}: {e}')

          if not out['prices']:
            print('No data fetched, aborting')
            exit(1)

          os.makedirs('data', exist_ok=True)
          with open('data/live.json', 'w') as f:
            json.dump(out, f, indent=2)
          print('Done:', out)
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --staged --quiet || git commit -m "chore: update live prices $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
